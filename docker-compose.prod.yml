services:

  # ─── Base de datos ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tickets_postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Puerto NO expuesto al host — solo accesible dentro de la red Docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tickets_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    # Puerto NO expuesto al host — solo accesible dentro de la red Docker
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production-final   # Sin devDependencies → imagen más liviana
    container_name: tickets_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    # Puerto NO expuesto directamente — nginx actúa como reverse proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Frontend (nginx + SSL) ───────────────────────────────────────
  frontend:
    build:
      context: ../SistemaTickets_365soft
      dockerfile: Dockerfile
      target: production
      args:
        # Valores tomados del .env (sin defaults hardcodeados)
        - VITE_API_URL
        - VITE_SOCKET_URL
    container_name: tickets_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      # Config nginx de producción (sobreescribe la del build)
      - ../SistemaTickets_365soft/nginx.prod.conf.template:/etc/nginx/templates/default.conf.template:ro
      # Certs de Let's Encrypt (montados como solo lectura)
      - certbot_conf:/etc/letsencrypt:ro
      # Directorio webroot para renovaciones de certbot
      - certbot_www:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"

  # ─── Certbot (renovación automática de SSL) ──────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: tickets_certbot
    restart: unless-stopped
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Intenta renovar cada 12 horas (certbot solo renueva si faltan <30 días)
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"

volumes:
  postgres_data:
  redis_data:
  certbot_conf:
  certbot_www:

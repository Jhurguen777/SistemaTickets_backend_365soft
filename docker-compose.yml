services:

  # ─── Base de datos ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tickets_postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tickets_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production   # Incluye devDeps (nodemon/ts-node para hot reload)
    container_name: tickets_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Se construye aquí para evitar duplicar credenciales en .env
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "127.0.0.1:3000:3000"  # Solo localhost — necesario para callback de Google OAuth
    # VOLUMES PARA HOT RELOAD - Monta el código local en el contenedor
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      # node_modules NO se monta — se usa el de la imagen (incluye devDeps para nodemon/ts-node)
      - /app/dist  # Permite que el build local se use
    # Comando para desarrollo con hot reload (sobrescribe el CMD del Dockerfile)
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Frontend (Vite → nginx) ─────────────────────────────────────
  frontend:
    build:
      context: ../SistemaTickets_365soft
      dockerfile: Dockerfile
      args:
        # Valores tomados del .env (sin defaults hardcodeados)
        - VITE_API_URL
        - VITE_SOCKET_URL
    container_name: tickets_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
      # - "443:443"   # Descomentar al agregar SSL/TLS

  # ─── pgAdmin ─────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: tickets_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
